<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Touch Grass!</title>
<style>
	body {
		margin: 0;
		height: 100vh;
		overflow: hidden;
		background: white;
		display: flex;
		justify-content: center;
		align-items: center;
		cursor: default;
		-webkit-user-select: none;
		-ms-user-select: none;
		user-select: none;
	}
	
	#movingImage {
		position: absolute;
		width: 150px;
		height: auto;
		transition: transform 0.15s ease;
		z-index: 10; 
	}

	.grid-container {
		position: absolute;
		top: 0;
		left: 0;
		width: 100vw;
		height: 100vh;
		display: grid;
		grid-template-columns: repeat(5, 1fr);
		grid-template-rows: repeat(5, 1fr);
		background-color: white; 
		z-index: 1;
	}

	.grid-cell {
		margin: 0;
		padding: 0;
		background-color: white;
		width: 100%;
		height: 100%;
	}

	.overlay-card {
		position: fixed;
		top: 15px;
		left: 15px;
		width: 220px;
		background-color: white;
		border: 3px solid #2e7d32; 
		border-radius: 4px;
		padding: 12px;
		z-index: 20;
		font-family: 'Courier New', monospace;
		color: #2e7d32; 
		box-shadow: 0 4px 6px rgba(0,0,0,0.05);
	}

	.overlay-title {
		font-size: 22px;
		font-weight: bold;
		text-align: center;
		border-bottom: 2px solid #2e7d32;
		padding-bottom: 6px;
		margin-bottom: 8px;
	}

	.score-row {
		display: flex;
		justify-content: space-between;
		font-size: 15px;
		font-weight: bold;
		margin: 4px 0;
	}

	.custom-cursor {
		width: 20px;
		height: 20px;
		background-color: green;
		border-radius: 50%;
		position: fixed;
		top: 0;
		left: 0;
		pointer-events: none; 
		transform: translate3d(0, 0, 0) translate(-50%, -50%);
		will-change: transform;
		z-index: 100;
		display: none; 
	}
